<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>配置页登录</title>
    <style>
      :root {
        --bg: #0f0f12;
        --surface: #18181c;
        --border: #2a2a30;
        --text: #e4e4e7;
        --text-muted: #a1a1aa;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger-bg: #451a1a;
        --danger-text: #fecaca;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1a1a22, var(--bg) 55%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .card {
        width: min(420px, calc(100vw - 32px));
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }
      p {
        margin: 0 0 18px;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.6;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #101014;
        color: var(--text);
        font-size: 14px;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        width: 100%;
        margin-top: 16px;
        border: none;
        border-radius: 8px;
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        cursor: pointer;
      }
      button:hover { background: var(--accent-hover); }
      .error {
        display: none;
        margin-top: 14px;
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--danger-bg);
        color: var(--danger-text);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <form class="card" id="loginForm">
      <h1>配置页登录</h1>
      <p>请输入配置的 <code>auth.config_secret</code> 原始明文。Hosted 模式下也支持通过环境变量提供。</p>
      <label for="secret">Secret</label>
      <input id="secret" name="secret" type="password" autocomplete="current-password" />
      <button type="submit">登录</button>
      <div class="error" id="error"></div>
    </form>
    <script>
      const form = document.getElementById('loginForm')
      const secretInput = document.getElementById('secret')
      const errorEl = document.getElementById('error')

      function showError(msg) {
        errorEl.textContent = msg
        errorEl.style.display = 'block'
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        errorEl.style.display = 'none'
        const secret = secretInput.value.trim()
        if (!secret) {
          showError('请输入 secret')
          return
        }
        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ secret }),
          })
          if (!res.ok) {
            let message = '登录失败'
            try {
              const data = await res.json()
              message = data.detail || message
            } catch (_) {
              const text = await res.text()
              message = text || message
            }
            throw new Error(message)
          }
          window.location.href = '/config'
        } catch (err) {
          showError(err.message || '登录失败')
        }
      })
    </script>
  </body>
</html>
