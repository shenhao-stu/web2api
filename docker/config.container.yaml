server:
  host: '0.0.0.0'
  port: 9000

auth:
  # 留空表示不启用 API Key；如果填写，所有 /{type}/v1/* 请求都要带匹配的 Key。
  # 支持单个字符串、逗号分隔字符串或 YAML 列表。
  api_key: ''

  # 留空表示不启用配置页；填写明文后，首次启动会自动转换成哈希并回写到 /data/config.yaml。
  config_secret: ''
  config_login_max_failures: 5
  config_login_lock_seconds: 600

browser:
  # 容器内 fingerprint-chromium 的固定路径
  chromium_bin: '/opt/fingerprint-chromium/chrome'

  # Claude 不建议 headless，默认继续使用 Xvfb 虚拟显示
  headless: false

  # 容器内默认关闭 sandbox，避免 Chromium 因容器权限限制无法启动
  no_sandbox: true

  # 容器环境通常没有可用 GPU，建议显式关闭
  disable_gpu: true

  # 某些容器环境里 GPU sandbox 也可能导致额外问题
  disable_gpu_sandbox: true

  cdp_port_start: 9222
  cdp_port_count: 20

scheduler:
  tab_max_concurrent: 5
  browser_gc_interval_seconds: 300
  tab_idle_seconds: 900
  resident_browser_count: 1

claude:
  start_url: ''
  api_base: ''
  model_mapping:
    s4: claude-sonnet-4-5-20250929

mock:
  port: 8002
